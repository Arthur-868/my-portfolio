<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f7f5" />
    <title>Color Words</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="experience" aria-live="polite">
      <div class="shape shape--top-left" aria-hidden="true"></div>
      <div class="shape shape--top-right" aria-hidden="true"></div>
      <div class="shape shape--bottom-left" aria-hidden="true"></div>
      <div class="shape shape--bottom-right" aria-hidden="true"></div>

      <button class="word" type="button" aria-label="切换到下一种颜色">
        <span class="word__label">Design</span>
      </button>

      <p class="hint">click the word</p>
      <div class="transition-layer" aria-hidden="true"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
